<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMM Kalimat Sederhana</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #06D6A0; --s: #118AB2; --dark: #073B4C; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { width: 90%; max-width: 500px; background: white; border: 4px solid var(--dark); border-radius: 30px; padding: 40px 20px; box-shadow: 10px 10px 0 var(--dark); text-align: center; position: relative; }
        
        .badge { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); background: var(--p); color: white; padding: 8px 20px; border-radius: 20px; font-family: 'Fredoka One'; border: 3px solid var(--dark); font-size: 0.9rem; }

        /* Area Teks Utama */
        .sentence-area { min-height: 200px; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; }
        .sentence { font-size: 2.2rem; line-height: 1.4; color: var(--dark); font-weight: 900; word-spacing: 10px; }
        .sentence span.highlight { color: #EF476F; border-bottom: 4px dashed #EF476F; }

        .hint { font-size: 0.8rem; color: #aaa; margin-top: 20px; font-weight: bold; text-transform: uppercase; }

        .nav { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        .btn { flex: 1; padding: 15px; border-radius: 15px; border: 3px solid var(--dark); font-family: 'Fredoka One'; cursor: pointer; box-shadow: 0 5px 0 var(--dark); transition: 0.1s; font-size: 1rem; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--dark); }
        .btn-next { background: var(--s); color: white; }
    </style>
</head>
<body>

<div class="card">
    <div class="badge" id="level-tag">KARTU 1</div>
    
    <div class="sentence-area" onclick="readFull()">
        <p class="sentence" id="text-display">BUDI MAKAN NASI</p>
        <p class="hint">Klik teks untuk dengar suara</p>
    </div>

    <div class="nav">
        <button class="btn" style="background:#eee" onclick="move(-1)">KIRI</button>
        <button class="btn btn-next" onclick="move(1)">KANAN</button>
    </div>
</div>

<script>
    const sentences = [
        { t: "BUDI MAKAN NASI", h: "N" },
        { t: "IBU BELI GULA", h: "" },
        { t: "ADIK CARI KUCING", h: "NG" },
        { t: "BAPAK BACA BUKU", h: "" },
        { t: "SAPI MAKAN RUMPUT", h: "T" },
        { t: "DINA CUCI GELAS", h: "S" },
        { t: "IWAN PERGI KE DANAU", h: "AU" },
        { t: "NYAMUK ADA DI SANA", h: "NY" },
        { t: "KAMI LIHAT BURUNG", h: "NG" },
        { t: "HARI INI SANGAT PANAS", h: "S" },
        { t: "AYAH BELI PISANG", h: "NG" },
        { t: "SYARAT BACA ADALAH RAJIN", h: "SY" }
    ];

    let current = 0;

    function readFull() {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(sentences[current].t);
        m.lang = 'id-ID'; m.rate = 0.8;
        window.speechSynthesis.speak(m);
    }

    function render() {
        document.getElementById('level-tag').innerText = `KARTU ${current + 1}`;
        const item = sentences[current];
        let display = item.t;
        
        // Highlight bagian yang sulit jika ada
        if(item.h !== "") {
            display = item.t.replace(item.h, `<span class="highlight">${item.h}</span>`);
        }
        
        document.getElementById('text-display').innerHTML = display;
    }

    function move(d) {
        current += d;
        if(current < 0) current = 0;
        if(current >= sentences.length) current = sentences.length - 1;
        render();
    }

    render();
</script>
</body>
</html>
