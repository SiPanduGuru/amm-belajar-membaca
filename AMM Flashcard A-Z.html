<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMM Flashcard HP Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #FF477E; --s: #00B4D8; --y: #FFD60A; --g: #38B000; --bg: #FFF9E6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; font-family: 'Quicksand', sans-serif; background: var(--bg); 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Navigasi Huruf yang Diperbaiki (Besar & Scrollable) */
        .abc-nav { 
            display: flex; overflow-x: auto; background: #333; 
            padding: 15px 10px; gap: 12px; 
            scrollbar-width: none; border-bottom: 5px solid var(--p);
            -webkit-overflow-scrolling: touch;
        }
        .abc-nav::-webkit-scrollbar { display: none; }

        .tab { 
            flex: 0 0 auto; padding: 12px 20px; border-radius: 18px; 
            border: none; font-family: 'Fredoka One'; font-size: 1.1rem; 
            color: white; cursor: pointer; background: #444;
            transition: 0.2s;
        }
        .tab.active { 
            background: var(--p); transform: scale(1.1); 
            box-shadow: 0 4px 0 #b02e54; 
        }

        /* Konten Utama */
        .stage { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 15px;
        }

        .card { 
            width: 100%; max-width: 380px; padding: 30px 10px; 
            border-radius: 40px; border: 6px solid #333; 
            background: #fff; text-align: center; 
            box-shadow: 0 12px 0 #ddd;
        }
        
        .syl-row { 
            display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; 
        }
        .syl-box { 
            font-family: 'Fredoka One'; font-size: 3.5rem; color: #333; 
            background: #F0F4F8; padding: 15px 20px; border-radius: 20px; 
            border: 4px solid #DEE2E6; cursor: pointer; 
            box-shadow: 0 6px 0 #DEE2E6;
        }
        @media (max-width: 380px) { .syl-box { font-size: 2.8rem; } }

        .full-label { 
            font-family: 'Fredoka One'; font-size: 2rem; color: white; 
            background: var(--s); padding: 10px 35px; border-radius: 50px; 
            display: inline-block; box-shadow: 0 5px 0 rgba(0,0,0,0.1); 
        }

        /* Kontrol Bawah */
        .footer { 
            padding: 20px; display: flex; justify-content: space-around; 
            align-items: center; background: white; border-top: 4px solid #eee;
        }
        .btn { 
            width: 65px; height: 65px; border-radius: 50%; border: 4px solid #333; 
            cursor: pointer; display: flex; justify-content: center; 
            align-items: center; font-size: 1.5rem; box-shadow: 0 5px 0 #333; 
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-play { background: var(--y); font-size: 2.2rem; width: 85px; height: 85px; }

        /* Animasi Card */
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: slideIn 0.4s ease; }
    </style>
</head>
<body>

    <div class="abc-nav" id="abc-nav"></div>

    <div class="stage">
        <div id="main-card" class="card">
            <div class="syl-row" id="syl-row"></div>
            <div id="full-txt" class="full-label">AYAM</div>
        </div>
        <p style="margin-top:20px; font-weight:bold; color:#888; text-align:center;">
            Tekan kotak eceran ya! 👆
        </p>
    </div>

    <div class="footer">
        <button class="btn" style="background:#CCC" onclick="move(-1)">◀</button>
        <button class="btn btn-play" onclick="speakAll()">🔊</button>
        <button class="btn" style="background:#2ED573; color:white;" onclick="move(1)">▶</button>
    </div>

<script>
    const data = {
        "A-B-C": [
            {s:["a","da"], f:"Ada"}, {s:["a","ni"], f:"Ani"}, {s:["a","bu"], f:"Abu"},
            {s:["ba","ca"], f:"Baca"}, {s:["ba","ju"], f:"Baju"}, {s:["bo","la"], f:"Bola"},
            {s:["ca","be"], f:"Cabe"}, {s:["cu","ci"], f:"Cuci"}, {s:["cu","mi"], f:"Cumi"}
        ],
        "D-E-F": [
            {s:["da","du"], f:"Dadu"}, {s:["da","si"], f:"Dasi"}, {s:["du","ri"], f:"Duri"},
            {s:["e","na"], f:"Ena"}, {s:["e","ra"], f:"Era"}, {s:["e","ka"], f:"Eka"},
            {s:["fa","na"], f:"Fana"}, {s:["fe","ra"], f:"Fera"}, {s:["fo","to"], f:"Foto"}
        ],
        "G-H-I": [
            {s:["ga","ji"], f:"Gaji"}, {s:["gu","la"], f:"Gula"}, {s:["ha","ri"], f:"Hari"},
            {s:["ha","ti"], f:"Hati"}, {s:["i","bu"], f:"Ibu"}, {s:["i","si"], f:"Isi"}
        ],
        "J-K-L": [
            {s:["ja","ri"], f:"Jari"}, {s:["ja","la"], f:"Jala"}, {s:["ka","ki"], f:"Kaki"},
            {s:["ka","yu"], f:"Kayu"}, {s:["la","ba"], f:"Laba"}, {s:["la","ri"], f:"Lari"}
        ],
        "M-N-O": [
            {s:["ma","ta"], f:"Mata"}, {s:["ma","ma"], f:"Mama"}, {s:["na","ga"], f:"Naga"},
            {s:["na","si"], f:"Nasi"}, {s:["o","ba"], f:"Oba"}, {s:["o","le"], f:"Ole"}
        ],
        "P-Q-R": [
            {s:["pa","pa"], f:"Papa"}, {s:["pi","ta"], f:"Pita"}, {s:["qa","ni"], f:"Qani"}, 
            {s:["ra","ja"], f:"Raja"}, {s:["ro","ti"], f:"Roti"}
        ],
        "S-T-U": [
            {s:["sa","pi"], f:"Sapi"}, {s:["su","su"], f:"Susu"}, {s:["ta","mu"], f:"Tamu"},
            {s:["to","pi"], f:"Topi"}, {s:["u","bi"], f:"Ubi"}, {s:["u","ji"], f:"Uji"}
        ],
        "V-W-X": [
            {s:["vi","na"], f:"Vina"}, {s:["wa","ti"], f:"Wati"}, {s:["xe","na"], f:"Xena"}
        ],
        "Y-Z": [
            {s:["ya","ni"], f:"Yani"}, {s:["yo","ga"], f:"Yoga"}, {s:["za","ki"], f:"Zaki"}
        ]
    };

    let curGrp = "A-B-C";
    let curIdx = 0;

    // Create Navigation Tabs
    const nav = document.getElementById('abc-nav');
    Object.keys(data).forEach(key => {
        const b = document.createElement('button');
        b.className = `tab ${key === curGrp ? 'active' : ''}`;
        b.innerText = key;
        b.onclick = (e) => { 
            curGrp = key; curIdx = 0; 
            updateTabs(); render(); 
            e.target.scrollIntoView({behavior: "smooth", inline: "center"});
        };
        nav.appendChild(b);
    });

    function updateTabs() {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText === curGrp));
    }

    function talk(t, r=0.8) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'id-ID'; m.rate = r; m.pitch = 1.3;
        window.speechSynthesis.speak(m);
    }

    function render() {
        const item = data[curGrp][curIdx];
        const row = document.getElementById('syl-row');
        const card = document.getElementById('main-card');
        
        row.innerHTML = '';
        item.s.forEach(s => {
            const d = document.createElement('div');
            d.className = 'syl-box'; d.innerText = s;
            d.onclick = () => { talk(s); d.style.transform = "scale(1.2)"; setTimeout(()=>d.style.transform="scale(1)", 200); };
            row.appendChild(d);
        });
        
        document.getElementById('full-txt').innerText = item.f;
        
        // Animasi Masuk
        card.classList.remove('animate-card');
        void card.offsetWidth; // Trigger reflow
        card.classList.add('animate-card');
    }

    function move(d) {
        curIdx += d;
        if(curIdx < 0) curIdx = data[curGrp].length - 1;
        if(curIdx >= data[curGrp].length) curIdx = 0;
        render();
    }

    function speakAll() {
        const item = data[curGrp][curIdx];
        // Eceran -> Eceran -> Full
        talk(`${item.s[0]}... ${item.s[1] || ''}... ${item.f}`, 0.65);
        confetti({ particleCount: 35, spread: 60, origin: { y: 0.8 } });
    }

    render();
</script>
</body>
</html>
